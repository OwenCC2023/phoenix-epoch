version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: phoenix_epoch_db
    environment:
      POSTGRES_DB: phoenix_epoch
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: phoenix_epoch_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
